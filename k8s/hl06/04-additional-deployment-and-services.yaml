apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl06-additional
  namespace: hl06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hl06-additional
  template:
    metadata:
      labels:
        app: hl06-additional
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: additional-service
          image: 10.60.3.11:8888/tospe/additional-service:ab8
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: hl06-additional-config
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-additional-internal
  namespace: hl06
spec:
  type: ClusterIP
  selector:
    app: hl06-additional
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-additional-nodeport
  namespace: hl06
spec:
  type: NodePort
  selector:
    app: hl06-additional
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      nodePort: 30083
