apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl06-app
  namespace: hl06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hl06-app
  template:
    metadata:
      labels:
        app: hl06-app
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      nodeSelector:
        hl06-workload: "true"
      hostAliases:
        - ip: "10.60.3.12"
          hostnames:
            - "hl14.zil"
        - ip: "10.60.3.13"
          hostnames:
            - "hl15.zil"
      containers:
        - name: app
          image: 10.60.3.11:8888/tospe/hl-module1:lab15
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          envFrom:
            - configMapRef:
                name: hl06-app-k8s-config
            - configMapRef:
                name: hl06-app-lab-kafka-config
            - secretRef:
                name: hl06-db-secret
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
