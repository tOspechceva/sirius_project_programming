apiVersion: v1
kind: Service
metadata:
  name: hl06-app-internal
  namespace: hl06
spec:
  type: ClusterIP
  selector:
    app: hl06-app
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-app-nodeport
  namespace: hl06
spec:
  type: NodePort
  selector:
    app: hl06-app
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 31082
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-additional-internal
  namespace: hl06
spec:
  type: ClusterIP
  selector:
    app: hl06-additional
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-additional-nodeport
  namespace: hl06
spec:
  type: NodePort
  selector:
    app: hl06-additional
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      nodePort: 31083
