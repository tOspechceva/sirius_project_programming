apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl06-app
  namespace: hl06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hl06-app
  template:
    metadata:
      labels:
        app: hl06-app
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      containers:
        - name: app
          image: 10.60.3.11:8888/tospe/hl-module1:lab6
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: hl06-app-config
            - secretRef:
                name: hl06-db-secret
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-app-internal
  namespace: hl06
spec:
  type: ClusterIP
  selector:
    app: hl06-app
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: hl06-app-nodeport
  namespace: hl06
spec:
  type: NodePort
  selector:
    app: hl06-app
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30082
