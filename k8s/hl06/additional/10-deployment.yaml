apiVersion: apps/v1
kind: Deployment
metadata:
  name: hl06-additional
  namespace: hl06
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hl06-additional
  template:
    metadata:
      labels:
        app: hl06-additional
    spec:
      imagePullSecrets:
        - name: dockerhub-registry-secret
      nodeSelector:
        hl06-workload: "true"
      containers:
        - name: additional-service
          image: 10.60.3.11:8888/tospe/additional-service:lab15
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 12
          envFrom:
            - configMapRef:
                name: hl06-additional-k8s-config
            - configMapRef:
                name: hl06-additional-lab-kafka-config
            - secretRef:
                name: hl06-db-secret
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
