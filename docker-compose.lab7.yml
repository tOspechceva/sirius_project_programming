services:
  # LAB7: application uses external DB node (hl12.zil)
  app:
    depends_on: []
    environment:
      DBHOST: ${DBHOST:-hl12.zil}
      DBPORT: ${DBPORT:-5432}
      DBNAME: ${DBNAME:-hl6}
      SCHEMANAME: ${SCHEMANAME:-hl6}
      DB_USERNAME: ${DB_USERNAME:-hl6}
      DB_PASSWORD: ${DB_PASSWORD:-pass_6}

  # Keep local postgres available only when explicitly requested.
  postgres:
    profiles: ["local-db"]
