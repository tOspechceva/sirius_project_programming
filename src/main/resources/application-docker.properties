# Docker profile defaults for LAB7 (external PostgreSQL by direct IP)
server.port=8081

spring.datasource.url=jdbc:postgresql://${DBHOST:192.168.1.184}:${DBPORT:5433}/${DBNAME:hl6}?currentSchema=${SCHEMANAME:public}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hl_postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

server.tomcat.max-threads=${SERVER_TOMCAT_MAX_THREADS:200}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.sql.init.mode=never
spring.flyway.baseline-on-migrate=true
