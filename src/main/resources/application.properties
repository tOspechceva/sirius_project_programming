spring.application.name=${SPRING_APPLICATION_NAME:hl-module1}

server.port=8081

# LAB16: POST /api/crash завершает процесс (по умолчанию выключено)
app.crash.enabled=${APP_CRASH_ENABLED:false}

# LAB15: Actuator / health (k8s probes: /actuator/health/liveness, /actuator/health/readiness)
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState,db,kafka

spring.datasource.url=jdbc:postgresql://${DBHOST:hl12.zil}:${DBPORT:5433}/${DBNAME:hl6}?currentSchema=${SCHEMANAME:public}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
server.tomcat.max-threads=${SERVER_TOMCAT_MAX_THREADS:200}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

spring.sql.init.mode=never
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

observability.windows=${OBSERVABILITY_WINDOWS:10s,30s,1m}
observability.tick-ms=${OBSERVABILITY_TICK_MS:1000}
observability.log-on-refresh=${OBSERVABILITY_LOG_ON_REFRESH:true}
observability.log-empty-snapshots=${OBSERVABILITY_LOG_EMPTY_SNAPSHOTS:false}

# LAB12: Kafka consumer (выключен по умолчанию, пока нет брокера — см. application-docker / SPRING_KAFKA_*)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:hl-module1-commands}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.type=batch
spring.kafka.listener.concurrency=${SPRING_KAFKA_LISTENER_CONCURRENCY:2}
spring.kafka.consumer.max-poll-records=${SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS:100}
spring.kafka.listener.auto-startup=${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}
app.kafka.topic.commands=${APP_KAFKA_TOPIC_COMMANDS:hl06}
