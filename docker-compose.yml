services:
  postgres:
    image: postgres:16
    container_name: hl-module1-postgres
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: hl_module1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hl_module1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: 10.60.3.11:8888/tospe/hl-module1:lab6
    container_name: hl-module1-app
    restart: unless-stopped
    depends_on: []
    environment:
      DBHOST: ${DBHOST:-hl12.zil}
      DBPORT: ${DBPORT:-5433}
      DBNAME: ${DBNAME:-hl6}
      SCHEMANAME: public
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_TOMCAT_MAX_THREADS: "200"
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8082:8081"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  k6:
    image: grafana/k6:0.52.0
    container_name: hl-module1-k6
    profiles: ["perf"]
    depends_on:
      app:
        condition: service_started
    working_dir: /scripts
    volumes:
      - ./k6:/scripts

volumes:
  postgres_data:
