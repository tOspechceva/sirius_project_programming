services:
  postgres:
    image: postgres:16
    container_name: hl-module1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hl_module1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hl_module1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hl-module1-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hl_module1
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8082:8081"

  k6:
    image: grafana/k6:0.52.0
    container_name: hl-module1-k6
    profiles: ["perf"]
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    working_dir: /scripts
    volumes:
      - ./k6:/scripts

volumes:
  postgres_data:
