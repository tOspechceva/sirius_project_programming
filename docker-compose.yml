services:
  app:
    # Образ приложения hl-module1 (при необходимости можно переопределить через DOCKER_IMAGE_APP)
    image: ${DOCKER_IMAGE_APP:-10.60.3.11:8888/tospe/hl-module1:lab6}
    container_name: hl-module1-app
    restart: unless-stopped
    ports:
      - "${APP_PUBLISH_PORT:-8082}:8081"
    extra_hosts:
      - "hl15.zil:10.60.3.13"
      - "hl14.zil:10.60.3.12"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Явный URL: Spring Boot отдает приоритет SPRING_DATASOURCE_URL над properties.
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DBHOST:-hl12.zil}:${DBPORT:-5433}/${DBNAME:-hl6}?currentSchema=${SCHEMANAME:-public}
      DBHOST: ${DBHOST:-hl12.zil}
      DBPORT: ${DBPORT:-5433}
      DBNAME: ${DBNAME:-hl6}
      SCHEMANAME: ${SCHEMANAME:-public}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-hl_postgres}
      SERVER_TOMCAT_MAX_THREADS: ${SERVER_TOMCAT_MAX_THREADS:-200}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:-false}
      OBSERVABILITY_TICK_MS: ${OBSERVABILITY_TICK_MS:-1000}
      OBSERVABILITY_LOG_ON_REFRESH: ${OBSERVABILITY_LOG_ON_REFRESH:-true}
      OBSERVABILITY_LOG_EMPTY_SNAPSHOTS: ${OBSERVABILITY_LOG_EMPTY_SNAPSHOTS:-true}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-10.60.3.13:9094,10.60.3.12:9094}
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:-true}
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${SPRING_KAFKA_LISTENER_CONCURRENCY:-2}
      APP_KAFKA_TOPIC_COMMANDS: ${APP_KAFKA_TOPIC_COMMANDS:-hl06}
      SPRING_KAFKA_CONSUMER_GROUP_ID: ${SPRING_KAFKA_CONSUMER_GROUP_ID:-hl-module1-commands}
    # Ограничения ресурсов для обычного docker compose (без Swarm).
    cpus: "${APP_CPU_LIMIT:-1.50}"
    mem_limit: "${APP_MEMORY_LIMIT:-1536m}"

  additional-service:
    image: ${DOCKER_IMAGE_ADDITIONAL:-10.60.3.11:8888/tospe/additional-service:ab8}
    container_name: hl-module1-additional-service
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${ADDITIONAL_PUBLISH_PORT:-8083}:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CRUD_BASE_URL: ${CRUD_BASE_URL:-http://app:8081}
      OBSERVABILITY_TICK_MS: ${OBSERVABILITY_TICK_MS:-1000}
      OBSERVABILITY_LOG_ON_REFRESH: ${OBSERVABILITY_LOG_ON_REFRESH:-true}
      OBSERVABILITY_LOG_EMPTY_SNAPSHOTS: ${OBSERVABILITY_LOG_EMPTY_SNAPSHOTS:-true}
      USER_CACHE_STATS_LOG_MS: ${USER_CACHE_STATS_LOG_MS:-60000}
      USER_CACHE_STATS_LOG_ENABLED: ${USER_CACHE_STATS_LOG_ENABLED:-true}
    cpus: "${ADDITIONAL_CPU_LIMIT:-1.00}"
    mem_limit: "${ADDITIONAL_MEMORY_LIMIT:-1024m}"

